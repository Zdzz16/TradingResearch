<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TradingResearch</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0e1117;
    --sidebar-bg: #16181d;
    --border: #262a33;
    --text: #e8eaed;
    --text-muted: #9aa2ad;
    --hover: rgba(255, 255, 255, 0.06);
    --active: rgba(255, 255, 255, 0.10);
    --accent: #4a9eff;
    --sidebar-w: 240px;
    --sidebar-w-collapsed: 64px;
    --speed: 160ms;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    display: flex;
  }

  /* ---------- sidebar ---------- */
  .sidebar {
    position: relative;
    z-index: 2;
    flex: 0 0 auto;
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width var(--speed) ease;
  }
  body.collapsed .sidebar { width: var(--sidebar-w-collapsed); }

  .sidebar-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    min-height: 56px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .brand-mark {
    flex: 0 0 auto;
    width: 26px; height: 26px;
    border-radius: 7px;
    background: linear-gradient(140deg, var(--accent), #7c5cff);
    display: grid;
    place-items: center;
  }
  .brand-mark svg { width: 15px; height: 15px; color: #fff; }
  body.collapsed .brand { display: none; }

  .toggle {
    margin-left: auto;
    flex: 0 0 auto;
    width: 32px; height: 32px;
    border: none;
    border-radius: 8px;
    background: none;
    color: var(--text-muted);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: background var(--speed) ease, color var(--speed) ease;
  }
  .toggle:hover { background: var(--hover); color: var(--text); }
  .toggle svg { width: 18px; height: 18px; }
  body.collapsed .toggle { margin: 0 auto; }

  /* ---------- nav ---------- */
  .nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 8px;
  }
  .nav-bottom { margin-top: auto; padding-bottom: 12px; }

  .nav-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 10px;
    border-radius: 8px;
    color: var(--text-muted);
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--speed) ease, color var(--speed) ease;
  }
  .nav-item:hover { background: var(--hover); color: var(--text); }
  .nav-item.active { background: var(--active); color: var(--text); }
  .nav-item .icon {
    flex: 0 0 20px;
    width: 20px; height: 20px;
    display: grid;
    place-items: center;
  }
  .nav-item .icon svg { width: 18px; height: 18px; }
  body.collapsed .nav-item { justify-content: center; }
  body.collapsed .nav-item .label { display: none; }

  /* tooltip — only when collapsed, since the labels are hidden then */
  body.collapsed .nav-item::after {
    content: attr(data-tip);
    position: absolute;
    left: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%);
    padding: 5px 9px;
    border-radius: 6px;
    background: #22262e;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 120ms ease;
    z-index: 10;
  }
  body.collapsed .nav-item:hover::after { opacity: 1; }

  /* ---------- main ---------- */
  .main {
    flex: 1;
    min-width: 0;
    overflow: auto;
  }
</style>
</head>
<body>
<script>
  // Restore the collapsed state before paint, so there's no flash.
  if (localStorage.getItem("sidebar-collapsed") === "1") {
    document.body.classList.add("collapsed");
  }
</script>

<aside class="sidebar">
  <div class="sidebar-top">
    <div class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l6-6 4 4 8-8"/>
        </svg>
      </span>
      <span>TradingResearch</span>
    </div>
    <button class="toggle" id="toggle" aria-label="Toggle sidebar" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 3v18"/>
      </svg>
    </button>
  </div>

  <nav class="nav">
    <a class="nav-item active" data-tip="Backtest">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <path d="m19 9-5 5-4-4-3 3"/>
        </svg>
      </span>
      <span class="label">Backtest</span>
    </a>

    <a class="nav-item" data-tip="Compare">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <rect x="7" y="12" width="3" height="6"/>
          <rect x="12" y="8" width="3" height="10"/>
          <rect x="17" y="5" width="3" height="13"/>
        </svg>
      </span>
      <span class="label">Compare</span>
    </a>

    <a class="nav-item" data-tip="Journal">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </span>
      <span class="label">Journal</span>
    </a>

    <a class="nav-item" data-tip="Notes">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <path d="M14 2v6h6"/>
          <path d="M16 13H8"/><path d="M16 17H8"/>
        </svg>
      </span>
      <span class="label">Notes</span>
    </a>
  </nav>

  <nav class="nav nav-bottom">
    <a class="nav-item" data-tip="Settings">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </span>
      <span class="label">Settings</span>
    </a>
  </nav>
</aside>

<main class="main">
  <!-- Intentionally empty — designed together, one step at a time. -->
</main>

<script>
  const toggle = document.getElementById("toggle");
  toggle.addEventListener("click", () => {
    const collapsed = document.body.classList.toggle("collapsed");
    localStorage.setItem("sidebar-collapsed", collapsed ? "1" : "0");
  });

  // Nav items don't lead anywhere yet — for now clicking just moves the
  // highlight, so the menu behaves like a menu.
  document.querySelectorAll(".nav-item").forEach((item) => {
    item.addEventListener("click", () => {
      document.querySelectorAll(".nav-item").forEach((i) => i.classList.remove("active"));
      item.classList.add("active");
    });
  });
</script>
</body>
</html>
